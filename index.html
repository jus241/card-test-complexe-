<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Card complexe</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="card">
      <div class="card-top">
        <div class="profil"></div>
      </div>
      <div class="card-description">
        <div class="description-top">
          <h3 class="non">Elena Rossi</h3>
          <p class="email">elena.@gmail.com</p>
          <p class="ville">
            Italie
            <ion-icon name="location-outline"></ion-icon>
          </p>
        </div>
      </div>
      <div class="pronostique">
        <div class="stat-pronostique">
          <p class="stat">38K</p>
          <p class="description-pronostique">Abonnés</p>
        </div>
        <div class="stat-pronostique">
          <p class="stat">103K</p>
          <p class="description-pronostique">Likes</p>
        </div>
        <div class="stat-pronostique">
          <p class="stat">1.3K</p>
          <p class="description-pronostique">Photos</p>
        </div>
      </div>
      <p class="infos">
        &copy; 2029 jus241
        <a href="https://github.com/jus241"
          ><ion-icon name="logo-github"></ion-icon
        ></a>
      </p>
    </div>

    <script
      type="module"
      src="https://unpkg.com/ionicons@8.0.13/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@8.0.13/dist/ionicons/ionicons.js"
    ></script>
  </body>
</html>
